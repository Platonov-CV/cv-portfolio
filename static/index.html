<!DOCTYPE html>
<html lang="en">

<body>
  <div class="container">
    <p class="title">PLATONOV CV</p>

    <p class="cmd">&gt; ls projects/</p>

    <div class="listing">

      <div class="row">
        <span class="idx">[02]</span>
        <a href="/box-measurement" class="name">box-measurement</a>
        <span class="desc">real-time box dimensions from webcam feed</span>
      </div>
    </div>

    <p class="prompt-line">&gt;<span class="cursor">█</span></p>
  </div>
</body>
</html>
